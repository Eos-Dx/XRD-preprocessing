# Reusable combined preprocessing contract.
# Use this template when one YAML contains both one-to-one and one-to-many
# branch rules. Current Aramis production examples use the branch-specific
# template instead.
preprocessing:
  version: 0.1-template

xrd_preprocessing:
  version: local
  release_tag: v0.1.3-beta

# Raw detector source. GFRM is the preferred product source when vendor bytes
# are available. NPY/TIFF are explicit alternatives for synthetic tests or
# controlled H5 blobs.
raw_data:
  source: gfrm
  location: h5_blob
  allowed_sources:
    - gfrm
    - npy
    - tiff
  h5_dataset_candidates:
    gfrm:
      - raw_file
      - artifacts/gfrm
    npy:
      - raw/data
      - processed/data
    tiff:
      - raw/tiff
      - raw_file

metadata:
  keep: all
  drop_payload_columns: true

# H5-level filters run before detector arrays are loaded.
# Accepted dates are product-owned, usually exported from calibration QC.
# P1/P2/P3 are the canonical measurement positions for current Aramis data.
filters:
  accepted_dates: []
  measurement_positions:
    - P1
    - P2
    - P3
  required_q_max_nm_inv: 23.0
  require_sample_thickness_mm: true
  require_calibrant_thickness_mm: true
  calibrant_thickness_range_mm: [10.0, 40.0]
  thickness:
    sample:
      column: sample_thickness_mm
      require: true
      min_mm: 0.0
    calibrant:
      column: calibrant_thickness_mm
      require: true
      min_mm: 10.0
      max_mm: 40.0

labels:
  grouping:
    BENIGN: BENIGN
    CANCER: CANCER
    ATYPICAL: CANCER
    PRE_CANCEROUS: CANCER
    NORMAL: NORMAL
    NA: exclude

# One-to-many is specimenId-level: one breast can be compared against breast
# specimens from other patients, with patient-safe splitting downstream.
one_to_many:
  specimen_status_keep:
    - BENIGN
    - CANCER
    - ATYPICAL
    - PRE_CANCEROUS
  min_measurements_per_specimen_after_snr: 1

# One-to-one is patientId-level: paired breast specimens are required after
# SNR/profile filtering so symmetry/asymmetry can be modeled.
one_to_one:
  specimen_status_keep:
    - BENIGN
    - CANCER
    - NORMAL
    - ATYPICAL
    - PRE_CANCEROUS
  patient_pair_keep:
    - [BENIGN, CANCER]
    - [BENIGN, NORMAL]
    - [CANCER, NORMAL]
  patient_pair_exclude:
    - [BENIGN, BENIGN]
    - [NORMAL, NORMAL]
    - [CANCER, CANCER]
  min_measurements_per_specimen_after_snr: 1
  min_specimens_per_patient_after_snr: 2

# Azimuthal integration settings. `npt=100` is the product default.
# Thickness correction columns must match filter thickness columns.
integration:
  npt: 100
  q_range_nm_inv: [2.0, 23.0]
  error_model: poisson
  thickness_correction:
    enabled: true
    sample_thickness_column: sample_thickness_mm
    calibrant_thickness_column: calibrant_thickness_mm
    require_sample_thickness: true
    require_calibrant_thickness: true
    calibrant_thickness_range_mm: [10.0, 40.0]

snr:
  method: poisson
  min_snr_db: 18.0

# Q-range normalization.
# mode: area keeps integrated area in the q window equal to 1.
# mode: value keeps a window statistic such as median equal to 1.
normalization:
  mode: value
  statistic: median
  q_range_nm_inv: [6.7, 7.1]
  save_initial_data: false

# Optional post-normalization profile gate.
profile_gate:
  q_nm_inv: 14.0
  min_value: 2.0
