# Reusable branch-specific preprocessing contract.
# Product repositories copy this template into their own config folder and fill
# product-specific cohort/date/label rules there. XRD-preprocessing only owns
# the schema and reusable transformer meaning.
preprocessing:
  version: 0.1-branch-template

# Branch identity. `decision_unit`, `row_unit`, and `grouping_unit` must be
# explicit so count tables and filters cannot mix patient/specimen/measurement
# levels silently.
aramis_preprocessing:
  name: product_branch_preprocessing
  version: 0.1
  product: Aramis
  clinical_stage: research draft
  branch: one_to_one
  decision_unit: patientId
  row_unit: measurementId
  grouping_unit: specimenId

xrd_preprocessing:
  version: local
  release_tag: v0.1.3-beta

# Raw data source contract. Product runs should use GFRM when original vendor
# bytes are present. NPY/TIFF are allowed only when explicitly declared, for
# synthetic tests or controlled non-GFRM containers.
raw_data:
  source: gfrm
  location: h5_blob
  allowed_sources:
    - gfrm
    - npy
    - tiff
  h5_dataset_candidates:
    gfrm:
      - raw_file
      - artifacts/gfrm
    npy:
      - raw/data
      - processed/data
    tiff:
      - raw/tiff
      - raw_file

metadata:
  keep: all
  drop_payload_columns: true

# H5-level filters run before detector arrays are loaded.
# `accepted_dates` is usually filled from product-owned calibration QC JSON.
# `measurement_positions` keeps only canonical product measurement points.
# Thickness fields must match `integration.thickness_correction`.
filters:
  accepted_dates: []
  measurement_positions:
    - P1
    - P2
    - P3
  required_q_max_nm_inv: 23.0
  require_sample_thickness_mm: true
  require_calibrant_thickness_mm: true
  calibrant_thickness_range_mm: [10.0, 40.0]
  thickness:
    sample:
      column: sample_thickness_mm
      require: true
      min_mm: 0.0
    calibrant:
      column: calibrant_thickness_mm
      require: true
      min_mm: 10.0
      max_mm: 40.0

labels:
  grouping:
    BENIGN: BENIGN
    CANCER: CANCER
    ATYPICAL: CANCER
    PRE_CANCEROUS: CANCER
    NORMAL: NORMAL
    NA: exclude

# Branch-specific clinical/product validity rules.
# One-to-one keeps patient pairs; one-to-many usually keeps individual specimen
# labels. Concrete products should document the exact level in README/docs.
branch_settings:
  specimen_status_keep:
    - BENIGN
    - CANCER
    - NORMAL
    - ATYPICAL
    - PRE_CANCEROUS
  patient_pair_keep:
    - [BENIGN, CANCER]
    - [BENIGN, NORMAL]
    - [CANCER, NORMAL]
  patient_pair_exclude:
    - [BENIGN, BENIGN]
    - [NORMAL, NORMAL]
    - [CANCER, CANCER]
  min_measurements_per_specimen_after_snr: 1
  min_specimens_per_patient_after_snr: 2

# Azimuthal integration settings. `npt` defaults to 100 for product notebooks
# and tests. Thickness correction is mandatory when sample/calibrant thickness
# metadata are required by the branch.
integration:
  npt: 100
  q_range_nm_inv: [2.0, 23.0]
  error_model: poisson
  thickness_correction:
    enabled: true
    sample_thickness_column: sample_thickness_mm
    calibrant_thickness_column: calibrant_thickness_mm
    require_sample_thickness: true
    require_calibrant_thickness: true
    calibrant_thickness_range_mm: [10.0, 40.0]

snr:
  method: poisson
  min_snr_db: 18.0

# Q-range normalization for downstream product profiles.
# mode: area keeps integrated area in the q window equal to 1.
# mode: value keeps a window statistic such as median equal to 1.
normalization:
  mode: value
  statistic: median
  q_range_nm_inv: [6.7, 7.1]
  save_initial_data: false

# Optional post-normalization signal gate on the radial profile.
profile_gate:
  q_nm_inv: 14.0
  min_value: 2.0
